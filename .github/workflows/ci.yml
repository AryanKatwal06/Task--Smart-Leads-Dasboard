name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    services:
      mongo:
        image: mongo:6.0
        ports:
          - 27017:27017
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install MongoDB in-memory deps
        run: |
          sudo apt-get update
          sudo apt-get install -y wget ca-certificates || true
          # Try to install libssl1.1 from apt; if unavailable, download a compatible deb and install it.
          if ! dpkg -s libssl1.1 >/dev/null 2>&1; then
            sudo apt-get install -y libssl1.1 || true
          fi
          if ! dpkg -s libssl1.1 >/dev/null 2>&1; then
            wget -q -O libssl1.1.deb http://security.ubuntu.com/ubuntu/pool/main/o/openssl1.1/libssl1.1_1.1.1f-1ubuntu2.16_amd64.deb
            sudo dpkg -i libssl1.1.deb || true
          fi

      - name: Install root deps
        run: npm ci

      - name: "Server: install & test"
        working-directory: server
        run: |
          npm ci
          npx tsc -p tsconfig.json
          npm test -- --coverage --runInBand
        env:
          JEST_JUNIT_OUTPUT_DIR: ./test-results
          JEST_JUNIT_OUTPUT_NAME: junit.xml

      - name: "Client: install & test"
        working-directory: client
        run: |
          npm ci
          npx tsc -p tsconfig.json
          npm test -- --ci --reporters=default --coverage
        env:
          JEST_JUNIT_OUTPUT_DIR: ./test-results
          JEST_JUNIT_OUTPUT_NAME: junit.xml

      - name: Run DB migrations (create indexes)
        working-directory: server
        env:
          MONGO_URI: mongodb://localhost:27017/smart_leads
        run: node scripts/add-lead-indexes.js || true

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            server/test-results/
            client/test-results/
          retention-days: 30

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: |
            server/coverage/
            client/coverage/
          retention-days: 30
